<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cutlery Pronunciation Quiz | xAPI LRS</title>
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- TinCanJS for xAPI -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tin-canjs/1.3.2/tincan-min.js"></script>
</head>
<body>

<!-- MODAL for Name & Email capture -->
<div id="learnerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <i class="fas fa-user-graduate"></i>
            <h2>Welcome to Cutlery Pronunciation Lab</h2>
        </div>
        <p>Please enter your details to begin. Your progress will be recorded in the Learning Record Store.</p>
        <div class="input-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="learnerName" placeholder="e.g., Maria Gonzalez" autocomplete="name">
        </div>
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="learnerEmail" placeholder="maria@example.com" autocomplete="email">
        </div>
        <button id="startQuizBtn" class="modal-btn">Start Pronunciation Quiz →</button>
        <div id="modalError" class="error-message"></div>
    </div>
</div>

<!-- MAIN QUIZ CONTAINER -->
<div class="quiz-container" id="quizApp" style="display: none;">
    <div class="quiz-header">
        <div class="logo">
            <i class="fas fa-utensils"></i>
            <span>cutlery·speak</span>
        </div>
        <div class="question-counter" id="counterDisplay">Question 1 / 5</div>
    </div>

    <div class="question-area">
        <div class="question-icon" id="questionIcon">🍴</div>
        <div class="question-text" id="questionText">What do you use to cut meat?</div>
        <div class="options-list" id="optionsContainer"></div>
    </div>

    <!-- Pronunciation ring + speech controls -->
    <div class="pronounce-section">
        <div class="ring-widget">
            <canvas id="ringCanvas" width="140" height="140"></canvas>
            <div class="ring-percentage" id="ringPercentText">0%</div>
        </div>
        <div class="speak-panel">
            <div class="expected-badge">
                <i class="fas fa-bullhorn"></i>
                <span>🎯 say this:</span>
            </div>
            <!-- HINT: initially hidden (style="display: none;") -->
            <div style="font-weight: 700; background: #fff0e4; padding: 0.3rem 0.8rem; border-radius: 40px; font-size: 1rem; margin-bottom: 12px; display: none;" id="targetPhrasePreview">I use a knife.</div>
            <button class="btn-speak" id="speakBtn">
                <i class="fas fa-microphone-alt"></i> Speak answer
            </button>
            <div class="recording-status" id="recordingStatus">🎤 ready</div>
            <div class="user-transcript" id="transcriptBox">📝 your speech will appear here</div>
            <div class="feedback-text" id="levFeedback"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn"><i class="fas fa-arrow-left"></i> Previous</button>
        <button class="nav-btn primary" id="nextBtn">Next <i class="fas fa-arrow-right"></i></button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
